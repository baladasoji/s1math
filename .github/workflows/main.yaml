name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  # ── Deploy static sites to S3 (website hosting account) ───────────────────
  deploy-sites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (website account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.WEBSITE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.WEBSITE_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy content site → s3://s1math.dasoji.net
        run: |
          aws s3 sync website/content/ s3://s1math.dasoji.net/ \
            --delete \
            --cache-control "max-age=300"

      - name: Deploy exercises site → s3://exercises.s1math.dasoji.net
        run: |
          aws s3 sync website/exercises/ s3://exercises.s1math.dasoji.net/ \
            --delete \
            --cache-control "max-age=300"

  # ── Deploy API infrastructure via SAM (API account) ───────────────────────
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (API account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.API_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.API_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
